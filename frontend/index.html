<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Moderation Demo</title>
  <style>
    :root {
      --bg: #0b0f15;
      --card: #141c28;
      --text: #e9f0fb;
      --muted: #9db0cc;
      --accent: #4db6ff;
      --accent-2: #00d2a8;
      --danger: #ff6b6b;
      --border: #263142;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1000px 500px at 10% 10%, rgba(77, 182, 255, 0.12), transparent 60%),
        radial-gradient(800px 500px at 90% 90%, rgba(0, 210, 168, 0.1), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1520;
      color: var(--text);
      font-size: 1rem;
      padding: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 600;
      cursor: pointer;
      color: #07111e;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }

    .secondary {
      color: var(--text);
      background: #1b2534;
      border: 1px solid var(--border);
    }

    .result {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #0f1520;
    }

    .k {
      color: var(--muted);
      width: 80px;
      display: inline-block;
    }

    .error {
      margin-top: 12px;
      color: var(--danger);
      min-height: 1.2em;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Stateful AI Content Moderation</h1>
    <p>Frontend -> FastAPI -> Groq LLM -> Moderation Output</p>

    <textarea id="textInput" placeholder="Type a comment to moderate..."></textarea>

    <div class="row">
      <button id="submitBtn">Moderate</button>
      <button class="secondary" id="demoBtn">Load Demo</button>
    </div>

    <section class="result hidden" id="resultBox">
      <div><span class="k">Label:</span><strong id="labelOut">-</strong></div>
      <div><span class="k">Action:</span><strong id="actionOut">-</strong></div>
    </section>

    <div class="error" id="errorOut"></div>
  </main>

  <script>
    const API_BASE = "http://localhost:8000";

    const textInput = document.getElementById("textInput");
    const submitBtn = document.getElementById("submitBtn");
    const demoBtn = document.getElementById("demoBtn");
    const resultBox = document.getElementById("resultBox");
    const labelOut = document.getElementById("labelOut");
    const actionOut = document.getElementById("actionOut");
    const errorOut = document.getElementById("errorOut");

    function showResult(data) {
      labelOut.textContent = data.label;
      actionOut.textContent = data.action;
      resultBox.classList.remove("hidden");
      errorOut.textContent = "";
    }

    function showError(message) {
      errorOut.textContent = message;
      resultBox.classList.add("hidden");
    }

    async function moderateText() {
      const text = textInput.value.trim();
      if (!text) {
        showError("Please enter some text before submitting.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Moderating...";

      try {
        const response = await fetch(`${API_BASE}/moderate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          const detail = await response.text();
          throw new Error(`API error (${response.status}): ${detail || "Unknown error"}`);
        }

        const data = await response.json();
        showResult(data);
      } catch (err) {
        showError(err.message || "Failed to connect to moderation API.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Moderate";
      }
    }

    async function loadDemo() {
      demoBtn.disabled = true;
      demoBtn.textContent = "Loading...";

      try {
        const response = await fetch(`${API_BASE}/demo`);
        if (!response.ok) {
          throw new Error(`Demo API error (${response.status})`);
        }
        const data = await response.json();
        textInput.value = data.input?.text || "";
        if (data.output) {
          showResult(data.output);
        }
      } catch (err) {
        showError(err.message || "Failed to load demo.");
      } finally {
        demoBtn.disabled = false;
        demoBtn.textContent = "Load Demo";
      }
    }

    submitBtn.addEventListener("click", moderateText);
    demoBtn.addEventListener("click", loadDemo);
  </script>
</body>
</html>
